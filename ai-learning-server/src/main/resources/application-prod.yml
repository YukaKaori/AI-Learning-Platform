# Production configuration. All credentials come from the environment — never commit secrets.
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

logging:
  level:
    root: warn
    com.yuka.ailearningserver: info

management:
  endpoints:
    web:
      exposure:
        include: health
